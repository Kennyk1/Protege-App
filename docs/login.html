<!DOCTYPE html>
<html lang="en">
<head>
<!-- Monetag In-Page Push -->
<script>(function(s){s.dataset.zone='9272446',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — SignalsBetIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#040810;
  --card:#0a1120;
  --border:rgba(0,255,136,0.1);
  --green:#00ff88;
  --red:#ff3a3a;
  --blue:#0099ff;
  --text:#e0e8ff;
  --muted:#4a5a7a;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;}
body{display:flex;flex-direction:column;min-height:100vh;}

.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,136,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.025) 1px,transparent 1px);background-size:60px 60px;}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}

.auth-wrap{width:100%;max-width:420px;}

.auth-logo{text-align:center;margin-bottom:36px;}
.auth-logo a{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.1em;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:10px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);}

.auth-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px 32px;}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.04em;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5;}

.form-group{margin-bottom:16px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;}
.form-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:14px 16px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:rgba(0,255,136,0.4);}
.form-input::placeholder{color:var(--muted);}

.form-hint{font-size:12px;color:var(--muted);margin-top:6px;}

.submit-btn{width:100%;padding:16px;border-radius:8px;background:var(--green);border:none;color:#000;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.06em;transition:box-shadow 0.2s,opacity 0.2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-btn:hover{box-shadow:0 0 30px rgba(0,255,136,0.35);}
.submit-btn:active{opacity:0.85;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}

.switch-link{text-align:center;font-size:13px;color:var(--muted);}
.switch-link a{color:var(--green);text-decoration:none;font-weight:700;}

.error-box{background:rgba(255,58,58,0.08);border:1px solid rgba(255,58,58,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
.error-box.show{display:block;}

.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:12px;color:var(--muted);}
footer a{color:var(--muted);text-decoration:none;}
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="page">
  <div class="auth-wrap">
    <div class="auth-logo">
      <a href="index.html">
        <div class="logo-dot"></div>
        SIGNALSBETIQ
      </a>
    </div>

    <div class="auth-card">
      <div class="auth-title">WELCOME BACK</div>
      <div class="auth-sub">Login to access your signals and community.</div>

      <div class="error-box" id="errorBox"></div>

      <div class="form-group">
        <label class="form-label">Email or Phone</label>
        <input type="text" class="form-input" id="identifier" placeholder="Enter email or phone number" autocomplete="username"/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="login()">
        LOGIN TO DASHBOARD
      </button>

      <div class="divider">or</div>

      <div class="switch-link">
        Don't have an account? <a href="signup.html">Create one free →</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="index.html">← Back to SignalsBetIQ</a>
</footer>

<script>
const API = 'https://sample-api-1-ryj7.onrender.com';

if (localStorage.getItem('betiq_token')) {
  window.location.href = 'dashboard.html';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function login() {
  const identifier = document.getElementById('identifier').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorBox');

  err.classList.remove('show');

  if (!identifier || !password) {
    err.textContent = 'Please fill in all fields';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch(`${API}/api/bet/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('betiq_token', data.token);
      localStorage.setItem('betiq_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } else {
      err.textContent = data.error || 'Login failed. Try again.';
      err.classList.add('show');
    }
  } catch(e) {
    err.textContent = 'Network error. Please try again.';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'LOGIN TO DASHBOARD';
  }
}
</script>
</body>
</html>
