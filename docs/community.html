<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Community тАФ SignalsBetIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#040810;--card:#0a1120;--bubble:#0d1828;--border:rgba(0,255,136,0.08);--green:#00ff88;--red:#ff3a3a;--blue:#0099ff;--gold:#ffc107;--text:#e0e8ff;--muted:#4a5a7a;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(4,8,16,0.97);border-bottom:1px solid var(--border);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.hamburger{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;display:none;backdrop-filter:blur(4px);}
.drawer-overlay.show{display:block;}
.drawer{position:fixed;top:0;right:-280px;width:280px;height:100%;background:#070d18;border-left:1px solid var(--border);z-index:160;transition:right 0.3s ease;}
.drawer.open{right:0;}
.drawer-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drawer-logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.04em;}
.drawer-close{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.drawer-user{padding:16px 20px;border-bottom:1px solid var(--border);}
.drawer-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.drawer-email{font-size:12px;color:var(--muted);}
.drawer-links{padding:12px 0;}
.drawer-link{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;transition:all 0.2s;border:none;background:none;font-family:'Syne',sans-serif;width:100%;letter-spacing:0.02em;cursor:pointer;}
.drawer-link.active{color:var(--green);border-left:2px solid var(--green);}
.drawer-divider{height:1px;background:var(--border);margin:8px 0;}
.drawer-logout{color:var(--red)!important;}
.group-info{flex:1;}
.group-name{font-size:15px;font-weight:700;line-height:1;}
.group-sub{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.group-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,153,255,0.1));border:1px solid rgba(0,255,136,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.messages{position:fixed;top:58px;bottom:120px;left:0;right:0;overflow-y:auto;padding:12px 12px 8px;-webkit-overflow-scrolling:touch;}
.messages::-webkit-scrollbar{display:none;}
.date-sep{text-align:center;margin:12px 0;}
.date-sep span{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:4px 12px;font-size:11px;color:var(--muted);}
.msg-outer{position:relative;overflow:hidden;margin-bottom:8px;}
.swipe-arrow{position:absolute;top:50%;transform:translateY(-50%);opacity:0;transition:opacity 0.15s;pointer-events:none;z-index:0;width:28px;height:28px;border-radius:50%;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.2);display:flex;align-items:center;justify-content:center;}
.swipe-arrow-left{left:4px;}
.swipe-arrow-right{right:4px;}
.msg-wrap{display:flex;gap:8px;max-width:85%;align-items:flex-end;position:relative;z-index:1;will-change:transform;touch-action:pan-y;}
.msg-wrap.mine{margin-left:auto;flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-bottom:2px;}
.avatar-green{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.2);color:var(--green);}
.avatar-blue{background:rgba(0,153,255,0.15);border:1px solid rgba(0,153,255,0.2);color:var(--blue);}
.avatar-gold{background:rgba(255,193,7,0.15);border:1px solid rgba(255,193,7,0.2);color:var(--gold);}
.avatar-purple{background:rgba(180,100,255,0.15);border:1px solid rgba(180,100,255,0.2);color:#b464ff;}
.bubble{background:var(--bubble);border:1px solid rgba(255,255,255,0.05);border-radius:14px;border-bottom-left-radius:4px;padding:10px 12px;max-width:100%;}
.mine .bubble{background:rgba(0,255,136,0.08);border-color:rgba(0,255,136,0.15);border-bottom-right-radius:4px;border-bottom-left-radius:14px;}
.reply-quote{background:rgba(255,255,255,0.04);border-left:3px solid var(--green);border-radius:6px;padding:6px 10px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.reply-quote:active{background:rgba(0,255,136,0.08);}
.reply-quote-name{font-size:11px;font-weight:700;color:var(--green);margin-bottom:2px;}
.reply-quote-text{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.msg-sender{font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.sender-plan{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;}
.sp-premium{background:rgba(255,193,7,0.1);color:var(--gold);}
.sp-free{background:rgba(74,90,122,0.15);color:var(--muted);}
.msg-text{font-size:14px;line-height:1.5;word-break:break-word;}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px;text-align:right;font-family:'JetBrains Mono',monospace;}
.msg-img{max-width:220px;border-radius:10px;display:block;margin-bottom:4px;cursor:pointer;}
.bubble-reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.b-reaction{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:2px 8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent;}
.b-reaction span{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.reaction-popup{position:fixed;z-index:500;background:#0f1a2e;border:1px solid rgba(0,255,136,0.2);border-radius:50px;padding:8px 12px;display:none;gap:8px;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,0.7);}
.reaction-popup.show{display:flex;}
.react-opt{font-size:26px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s;}
.react-opt:active{transform:scale(1.4);}
.emoji-picker{position:fixed;bottom:120px;left:0;right:0;background:#070d18;border-top:1px solid var(--border);padding:10px 14px;display:none;z-index:90;}
.emoji-picker.show{display:block;}
.emoji-grid{display:flex;gap:8px;flex-wrap:wrap;}
.emoji-opt{font-size:22px;cursor:pointer;padding:4px;border-radius:8px;background:transparent;border:none;-webkit-tap-highlight-color:transparent;}
.emoji-opt:active{transform:scale(1.3);}
.reply-bar{display:none;padding:6px 14px;background:rgba(0,255,136,0.04);border-top:1px solid rgba(0,255,136,0.1);align-items:center;gap:10px;}
.reply-bar.show{display:flex;}
.reply-bar-content{flex:1;}
.reply-bar-name{font-size:11px;font-weight:700;color:var(--green);margin-bottom:1px;}
.reply-bar-text{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
.reply-bar-close{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.input-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,8,16,0.98);border-top:1px solid var(--border);padding-bottom:max(10px,env(safe-area-inset-bottom));}
.img-preview-wrap{padding:6px 12px 0;display:none;}
.img-preview-wrap.show{display:block;}
.img-preview-wrap img{height:70px;border-radius:8px;border:1px solid var(--border);}
.img-preview-close{position:absolute;top:-6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.input-row{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;}
.input-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.action-icon-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.msg-input-wrap{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:8px 14px;display:flex;align-items:flex-end;}
.msg-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;}
.msg-input::placeholder{color:var(--muted);}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--green);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:opacity 0.2s;}
.send-btn:active{opacity:0.8;}
.send-btn:disabled{opacity:0.4;}
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
.img-viewer.show{display:flex;}
.img-viewer img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain;}
.img-viewer-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#imgInput{display:none;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#0a1120;border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;transition:all 0.3s;z-index:700;white-space:nowrap;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:rgba(0,255,136,0.3);color:var(--green);}
.loading-msgs{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
</style>
</head>

<script>
const API = 'https://sample-api-1-ryj7.onrender.com';
const token = localStorage.getItem('betiq_token');
let userData = null, posts = [], selectedImage = null;
let emojiOpen = false, activeReactPostId = null, replyData = null;

if (!token) window.location.href = 'login.html';

const EMOJIS = ['ЁЯФе','ЁЯТ░','тЬЕ','тЭМ','ЁЯОп','ЁЯТп','ЁЯШВ','ЁЯЩП','ЁЯСН','ЁЯСО','тЪ╜','ЁЯПА','ЁЯО░','тЬИя╕П','ЁЯУИ','ЁЯТк','ЁЯдС','ЁЯШо','ЁЯОЙ','ЁЯПЖ'];
const AVATAR_COLORS = ['avatar-green','avatar-blue','avatar-gold','avatar-purple'];

function getAvatarColor(name) {
  let s = 0; for (let c of name) s += c.charCodeAt(0);
  return AVATAR_COLORS[s % AVATAR_COLORS.length];
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2000);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function timeAgo(d) {
  const diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return new Date(d).toLocaleDateString('en-NG',{day:'numeric',month:'short'});
}

function esc(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function apiFetch(ep, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type':'application/json','Authorization':`Bearer ${token}` } };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(`${API}${ep}`, opts)).json();
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('show');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('show');
}
function logout() {
  localStorage.removeItem('betiq_token');
  localStorage.removeItem('betiq_user');
  window.location.href = 'login.html';
}

async function loadUser() {
  const d = await apiFetch('/api/bet/me');
  if (!d.success) { window.location.href = 'login.html'; return; }
  userData = d.user;
  document.getElementById('drawerName').textContent = userData.name;
  document.getElementById('drawerEmail').textContent = userData.email || userData.phone || '';
}

async function loadPosts() {
  try {
    const d = await apiFetch('/api/bet/community/posts?limit=50');
    if (!d.success) return;
    // Reverse so oldest at top, newest at bottom
    posts = (d.posts || []).reverse();
    document.getElementById('memberCount').textContent = `${Math.max(posts.length+12,20)} members`;
    const wasAtBottom = isAtBottom();
    renderMessages();
    // Always scroll to bottom on first load, or if user was already at bottom
    if (wasAtBottom || posts.length <= 50) scrollBottom();
  } catch(e) {
    document.getElementById('messagesArea').innerHTML = '<div class="loading-msgs">Failed to load.</div>';
  }
}

function scrollToMsg(postId) {
  const el = document.getElementById(`outer-${postId}`);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // Flash highlight
  const bubble = el.querySelector('.bubble');
  if (bubble) {
    bubble.style.transition = 'background 0.3s';
    bubble.style.background = 'rgba(0,255,136,0.15)';
    setTimeout(() => bubble.style.background = '', 1000);
  }
}

function isAtBottom() {
  const a = document.getElementById('messagesArea');
  return a.scrollHeight - a.scrollTop - a.clientHeight < 100;
}

function renderMessages() {
  const area = document.getElementById('messagesArea');
  if (!posts.length) {
    area.innerHTML = '<div class="loading-msgs" style="padding-top:60px;">ЁЯСЛ No messages yet.<br/>Be first!</div>';
    return;
  }
  let html = '<div class="date-sep"><span>Today</span></div>';
  posts.forEach(p => {
    const isMe = p.user_id === userData?.id;
    const name = p.betiq_users?.name || 'User';
    const isPro = p.betiq_users?.plan === 'premium';
    const initial = name[0].toUpperCase();
    const avatarColor = getAvatarColor(name);

    const reactHTML = p.reactions && Object.keys(p.reactions).length
      ? `<div class="bubble-reactions">${Object.entries(p.reactions).map(([e,c])=>`<div class="b-reaction" onclick="quickReact('${p.id}','${e}')">${e}<span>${c}</span></div>`).join('')}</div>`
      : '';

    const replyHTML = p.reply_to_text
      ? `<div class="reply-quote" onclick="scrollToMsg('${p.reply_to}')">
          <div class="reply-quote-name">тЖй ${esc(p.reply_to_name||'User')}</div>
          <div class="reply-quote-text">${esc(p.reply_to_text)}</div>
         </div>`
      : '';

    html += `
      <div class="msg-outer" id="outer-${p.id}">
        <div class="swipe-arrow ${isMe?'swipe-arrow-left':'swipe-arrow-right'}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
        </div>
        <div class="msg-wrap ${isMe?'mine':''}" id="wrap-${p.id}"
          data-id="${p.id}" data-name="${esc(name)}" data-text="${esc(p.content||'')}" data-mine="${isMe}">
          ${!isMe?`<div class="msg-avatar ${avatarColor}">${initial}</div>`:''}
          <div>
            ${!isMe?`<div class="msg-sender" style="color:${isPro?'var(--gold)':'var(--muted)'}">
              ${esc(name)}<span class="sender-plan ${isPro?'sp-premium':'sp-free'}">${isPro?'PRO':'FREE'}</span>
            </div>`:''}
            <div class="bubble" id="bubble-${p.id}">
              ${replyHTML}
              ${p.image_url?`<img class="msg-img" src="${p.image_url}" onclick="viewImg('${p.image_url}')"/>`:''}
              <div class="msg-text">${esc(p.content)}</div>
              <div class="msg-time">${timeAgo(p.created_at)}</div>
              ${reactHTML}
            </div>
          </div>
        </div>
      </div>`;
  });

  area.innerHTML = html;
  attachSwipe();
  attachLongPress();
  scrollBottom();
}

function scrollBottom(instant=false) {
  const a = document.getElementById('messagesArea');
  if (instant) { a.scrollTop = a.scrollHeight; return; }
  setTimeout(() => a.scrollTop = a.scrollHeight, 80);
}

// SWIPE TO REPLY
function attachSwipe() {
  document.querySelectorAll('.msg-wrap').forEach(wrap => {
    let x0 = 0, y0 = 0, active = false;
    wrap.addEventListener('touchstart', e => {
      x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; active = true;
    }, {passive:true});
    wrap.addEventListener('touchmove', e => {
      if (!active) return;
      const dx = e.touches[0].clientX - x0;
      const dy = Math.abs(e.touches[0].clientY - y0);
      if (dy > 15) { active = false; wrap.style.transform = ''; return; }
      const isMe = wrap.dataset.mine === 'true';
      const valid = isMe ? dx < 0 : dx > 0;
      if (valid) {
        const move = isMe ? Math.max(dx, -65) : Math.min(dx, 65);
        wrap.style.transform = `translateX(${move}px)`;
        const arrow = document.querySelector(`#outer-${wrap.dataset.id} .swipe-arrow`);
        if (arrow) arrow.style.opacity = Math.min(Math.abs(move)/65, 1);
      }
    }, {passive:true});
    wrap.addEventListener('touchend', e => {
      if (!active) return;
      const dx = e.changedTouches[0].clientX - x0;
      const isMe = wrap.dataset.mine === 'true';
      wrap.style.transform = '';
      const arrow = document.querySelector(`#outer-${wrap.dataset.id} .swipe-arrow`);
      if (arrow) arrow.style.opacity = 0;
      if ((isMe && dx < -50) || (!isMe && dx > 50)) {
        triggerReply(wrap.dataset.id, wrap.dataset.name, wrap.dataset.text);
      }
      active = false;
    }, {passive:true});
  });
}

function triggerReply(id, name, text) {
  replyData = {id, name, text};
  document.getElementById('replyBarName').textContent = name;
  document.getElementById('replyBarText').textContent = text.substring(0,60) + (text.length>60?'...':'');
  document.getElementById('replyBar').classList.add('show');
  document.getElementById('msgInput').focus();
  if (navigator.vibrate) navigator.vibrate(50);
}

function clearReply() {
  replyData = null;
  document.getElementById('replyBar').classList.remove('show');
}

// LONG PRESS REACTIONS
function attachLongPress() {
  document.querySelectorAll('.bubble').forEach(bubble => {
    let timer = null;
    const postId = bubble.id.replace('bubble-','');
    bubble.addEventListener('touchstart', e => {
      timer = setTimeout(() => {
        showReactionPopup(postId, e.touches[0].clientX, e.touches[0].clientY);
        if (navigator.vibrate) navigator.vibrate(60);
      }, 500);
    }, {passive:true});
    ['touchend','touchmove','touchcancel'].forEach(ev => bubble.addEventListener(ev, () => clearTimeout(timer), {passive:true}));
  });
}

function showReactionPopup(postId, x, y) {
  activeReactPostId = postId;
  const popup = document.getElementById('reactionPopup');
  popup.classList.add('show');
  const pw = 320;
  const left = Math.min(Math.max(x - pw/2, 8), window.innerWidth - pw - 8);
  const top = Math.max(y - 80, 80);
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  setTimeout(() => document.addEventListener('touchstart', closeReactionPopup, {once:true}), 600);
}

function closeReactionPopup() {
  document.getElementById('reactionPopup').classList.remove('show');
  activeReactPostId = null;
}

async function doReact(emoji) {
  const id = activeReactPostId;
  document.getElementById('reactionPopup').classList.remove('show');
  activeReactPostId = null;
  if (id) await quickReact(id, emoji);
}

async function quickReact(postId, emoji) {
  try {
    await apiFetch(`/api/bet/community/posts/${postId}/react`, 'POST', {emoji});
    await loadPosts();
  } catch(e) {}
}

// EMOJI PICKER
function toggleEmoji() {
  emojiOpen = !emojiOpen;
  document.getElementById('emojiPicker').classList.toggle('show', emojiOpen);
}
const grid = document.getElementById('emojiGrid');
EMOJIS.forEach(e => {
  const btn = document.createElement('button');
  btn.className = 'emoji-opt'; btn.textContent = e;
  btn.onclick = () => {
    document.getElementById('msgInput').value += e;
    autoResize(document.getElementById('msgInput'));
    toggleEmoji();
  };
  grid.appendChild(btn);
});

// IMAGE
function handleImage(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    selectedImage = e.target.result;
    document.getElementById('previewImg').src = selectedImage;
    document.getElementById('imgPreviewWrap').classList.add('show');
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  selectedImage = null;
  document.getElementById('imgPreviewWrap').classList.remove('show');
  document.getElementById('imgInput').value = '';
}

function viewImg(src) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('imgViewer').classList.add('show');
}

function closeViewer() {
  document.getElementById('imgViewer').classList.remove('show');
}

// SEND
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content && !selectedImage) return;
  document.getElementById('sendBtn').disabled = true;
  try {
    const body = {
      content: content || 'ЁЯУ╖',
      image_url: selectedImage || null,
      reply_to: replyData?.id || null,
      reply_to_name: replyData?.name || null,
      reply_to_text: replyData?.text || null
    };
    const d = await apiFetch('/api/bet/community/posts', 'POST', body);
    if (d.success) {
      input.value = ''; input.style.height = 'auto';
      clearImage(); clearReply();
      if (emojiOpen) toggleEmoji();
      await loadPosts();
    } else showToast(d.error || 'Failed', 'error');
  } catch(e) { showToast('Network error', 'error'); }
  finally { document.getElementById('sendBtn').disabled = false; }
}

document.getElementById('messagesArea').addEventListener('scroll', closeReactionPopup, {passive:true});

async function init() { await loadUser(); await loadPosts(); }
init();
setInterval(loadPosts, 10000);
</script>
