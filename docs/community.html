<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Community — SignalsBetIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script>(function(s){s.dataset.zone='9272446',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#040810;--card:#0a1120;--bubble:#0d1828;--border:rgba(0,255,136,0.08);--green:#00ff88;--red:#ff3a3a;--blue:#0099ff;--gold:#ffc107;--text:#e0e8ff;--muted:#4a5a7a;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:58px;display:flex;align-items:center;gap:12px;padding:0 14px;background:rgba(4,8,16,0.97);border-bottom:1px solid var(--border);}
.back-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.group-info{flex:1;}
.group-name{font-size:15px;font-weight:700;line-height:1;}
.group-sub{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.group-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,153,255,0.1));border:1px solid rgba(0,255,136,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* MESSAGES AREA */
.messages{position:fixed;top:58px;bottom:116px;left:0;right:0;overflow-y:auto;padding:12px 12px 8px;-webkit-overflow-scrolling:touch;}
.messages::-webkit-scrollbar{display:none;}

/* DATE SEPARATOR */
.date-sep{text-align:center;margin:12px 0;}
.date-sep span{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:4px 12px;font-size:11px;color:var(--muted);}

/* MESSAGE BUBBLE */
.msg-wrap{display:flex;gap:8px;margin-bottom:8px;max-width:85%;align-items:flex-end;}
.msg-wrap.mine{margin-left:auto;flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-bottom:2px;}
.avatar-green{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.2);color:var(--green);}
.avatar-blue{background:rgba(0,153,255,0.15);border:1px solid rgba(0,153,255,0.2);color:var(--blue);}
.avatar-gold{background:rgba(255,193,7,0.15);border:1px solid rgba(255,193,7,0.2);color:var(--gold);}
.avatar-purple{background:rgba(180,100,255,0.15);border:1px solid rgba(180,100,255,0.2);color:#b464ff;}
.bubble{background:var(--bubble);border:1px solid rgba(255,255,255,0.05);border-radius:14px;border-bottom-left-radius:4px;padding:10px 12px;max-width:100%;}
.mine .bubble{background:rgba(0,255,136,0.08);border-color:rgba(0,255,136,0.15);border-bottom-right-radius:4px;border-bottom-left-radius:14px;}
.msg-sender{font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.sender-plan{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;}
.sp-premium{background:rgba(255,193,7,0.1);color:var(--gold);}
.sp-free{background:rgba(74,90,122,0.15);color:var(--muted);}
.msg-text{font-size:14px;line-height:1.5;word-break:break-word;}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px;text-align:right;font-family:'JetBrains Mono',monospace;}

/* IMAGE MSG */
.msg-img{max-width:220px;border-radius:10px;display:block;margin-bottom:4px;cursor:pointer;}

/* REACTIONS on bubble */
.bubble-reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.b-reaction{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:2px 8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent;}
.b-reaction span{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.b-reaction.mine-react{background:rgba(0,255,136,0.08);border-color:rgba(0,255,136,0.2);}

/* EMOJI PICKER */
.emoji-picker{position:fixed;bottom:116px;left:0;right:0;background:#070d18;border-top:1px solid var(--border);padding:10px 14px;display:none;z-index:90;}
.emoji-picker.show{display:block;}
.emoji-grid{display:flex;gap:8px;flex-wrap:wrap;}
.emoji-opt{font-size:22px;cursor:pointer;padding:4px;border-radius:8px;background:transparent;border:none;transition:transform 0.15s;-webkit-tap-highlight-color:transparent;}
.emoji-opt:active{transform:scale(1.3);}

/* INPUT BAR */
.input-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,8,16,0.98);border-top:1px solid var(--border);padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.input-row{display:flex;align-items:flex-end;gap:8px;}
.input-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.action-icon-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.msg-input-wrap{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:8px 14px;display:flex;align-items:flex-end;gap:8px;}
.msg-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;}
.msg-input::placeholder{color:var(--muted);}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--green);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:opacity 0.2s;}
.send-btn:active{opacity:0.8;}
.send-btn:disabled{opacity:0.4;}

/* IMAGE PREVIEW */
.img-preview{margin-bottom:8px;display:none;position:relative;}
.img-preview img{height:80px;border-radius:8px;border:1px solid var(--border);}
.img-preview-close{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* HIDDEN FILE INPUT */
#imgInput{display:none;}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#0a1120;border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;transition:transform 0.3s;z-index:300;white-space:nowrap;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:rgba(0,255,136,0.3);color:var(--green);}

.loading-msgs{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="back-btn" onclick="window.location.href='dashboard.html'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <div class="group-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
  </div>
  <div class="group-info">
    <div class="group-name">BetIQ Community</div>
    <div class="group-sub"><div class="online-dot"></div><span id="memberCount">Loading...</span></div>
  </div>
</div>

<!-- MESSAGES -->
<div class="messages" id="messagesArea">
  <div class="loading-msgs">Loading community...</div>
</div>

<!-- EMOJI PICKER -->
<div class="emoji-picker" id="emojiPicker">
  <div class="emoji-grid">
    🔥💰✅❌🎯💯😂🙏👍👎⚽🏀🎰✈️📈💪🤑😮🎉🏆
    <span style="font-size:11px;color:var(--muted);align-self:center;margin-left:4px;">Tap to react or add to message</span>
  </div>
</div>

<!-- INPUT BAR -->
<div class="input-bar">
  <div class="img-preview" id="imgPreview">
    <img id="previewImg" src="" alt=""/>
    <button class="img-preview-close" onclick="clearImage()">×</button>
  </div>
  <div class="input-row">
    <div class="input-actions">
      <div class="action-icon-btn" onclick="toggleEmoji()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </div>
      <div class="action-icon-btn" onclick="document.getElementById('imgInput').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
    </div>
    <div class="msg-input-wrap">
      <textarea class="msg-input" id="msgInput" placeholder="Share your tips, wins..." rows="1" maxlength="500" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<input type="file" id="imgInput" accept="image/*" onchange="handleImage(event)"/>
<div class="toast" id="toast"></div>

<script>
const API = 'https://sample-api-1-ryj7.onrender.com';
const token = localStorage.getItem('betiq_token');
let userData = null;
let posts = [];
let selectedImage = null;
let emojiOpen = false;
let activeReactPost = null;

if (!token) window.location.href = 'login.html';

const AVATAR_COLORS = ['avatar-green','avatar-blue','avatar-gold','avatar-purple'];
function getAvatarColor(name) {
  let sum = 0;
  for (let c of name) sum += c.charCodeAt(0);
  return AVATAR_COLORS[sum % AVATAR_COLORS.length];
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2000);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return new Date(dateStr).toLocaleDateString('en-NG',{day:'numeric',month:'short'});
}

async function api(ep, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${ep}`, opts);
  return res.json();
}

async function loadUser() {
  try {
    const data = await api('/api/bet/me');
    if (!data.success) { window.location.href = 'login.html'; return; }
    userData = data.user;
  } catch(e) {}
}

async function loadPosts() {
  try {
    const data = await api('/api/bet/community/posts?limit=50');
    if (!data.success) return;
    posts = data.posts || [];
    document.getElementById('memberCount').textContent = `${Math.max(posts.length + 12, 20)} members`;
    renderMessages();
  } catch(e) {
    document.getElementById('messagesArea').innerHTML = '<div class="loading-msgs">Failed to load. Try again.</div>';
  }
}

function renderMessages() {
  const area = document.getElementById('messagesArea');
  if (!posts.length) {
    area.innerHTML = '<div class="loading-msgs" style="padding-top:60px;">👋 No messages yet.<br/>Be the first to share!</div>';
    return;
  }

  let html = '<div class="date-sep"><span>Today</span></div>';
  posts.forEach(p => {
    const isMe = p.user_id === userData?.id;
    const name = p.betiq_users?.name || 'User';
    const plan = p.betiq_users?.plan || 'free';
    const initial = name[0].toUpperCase();
    const avatarColor = getAvatarColor(name);
    const isPremium = plan === 'premium';

    const reactionsHTML = p.reactions && Object.keys(p.reactions).length > 0
      ? `<div class="bubble-reactions">${Object.entries(p.reactions).map(([e,c])=>`<div class="b-reaction" onclick="reactPost('${p.id}','${e}')">${e}<span>${c}</span></div>`).join('')}</div>`
      : '';

    html += `
      <div class="msg-wrap ${isMe?'mine':''}">
        ${!isMe ? `<div class="msg-avatar ${avatarColor}">${initial}</div>` : ''}
        <div>
          ${!isMe ? `<div class="msg-sender" style="color:${isPremium?'var(--gold)':'var(--muted)'}">
            ${name}
            <span class="sender-plan ${isPremium?'sp-premium':'sp-free'}">${isPremium?'PRO':'FREE'}</span>
          </div>` : ''}
          <div class="bubble" id="bubble-${p.id}">
            ${p.image_url ? `<img class="msg-img" src="${p.image_url}" onclick="viewImg('${p.image_url}')"/>` : ''}
            <div class="msg-text">${escapeHtml(p.content)}</div>
            <div class="msg-time">${timeAgo(p.created_at)}</div>
            ${reactionsHTML}
          </div>
        </div>
      </div>
    `;
  });

  area.innerHTML = html;
  scrollBottom();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const area = document.getElementById('messagesArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 100);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content && !selectedImage) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  try {
    const body = { content: content || '📷', image_url: selectedImage || null };
    const data = await api('/api/bet/community/posts', 'POST', body);
    if (data.success) {
      input.value = '';
      input.style.height = 'auto';
      clearImage();
      await loadPosts();
    } else {
      showToast(data.error || 'Failed to send', 'error');
    }
  } catch(e) { showToast('Network error', 'error'); }
  finally { btn.disabled = false; }
}

async function reactPost(postId, emoji) {
  try {
    await api(`/api/bet/community/posts/${postId}/react`, 'POST', { emoji });
    await loadPosts();
  } catch(e) {}
}

function toggleEmoji() {
  emojiOpen = !emojiOpen;
  document.getElementById('emojiPicker').classList.toggle('show', emojiOpen);
}

document.querySelectorAll('.emoji-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    const emoji = btn.textContent;
    const input = document.getElementById('msgInput');
    input.value += emoji;
    autoResize(input);
    toggleEmoji();
  });
});

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    selectedImage = ev.target.result;
    document.getElementById('previewImg').src = selectedImage;
    document.getElementById('imgPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  selectedImage = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgInput').value = '';
}

function viewImg(src) {
  window.open(src, '_blank');
}

// Init
async function init() {
  await loadUser();
  await loadPosts();
}
init();

// Poll every 10 seconds for new messages
setInterval(loadPosts, 10000);
</script>
</body>
</html>
